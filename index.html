<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empreendimentos Primários · Selectlar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23C9A840'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Georgia,serif' font-size='38' font-weight='600' fill='%23111'%3ES%3C/text%3E%3C/svg%3E">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0D0D0D;
  --black2:#161616;
  --black3:#1F1F1F;
  --black4:#2A2A2A;
  --gold:#C9A840;
  --gold2:#E2C060;
  --gold3:#F0D980;
  --gold-dim:rgba(201,168,64,0.12);
  --gold-dim2:rgba(201,168,64,0.06);
  --text:#F0EDE6;
  --text2:#B8B4AA;
  --text3:#6E6B63;
  --border:rgba(201,168,64,0.15);
  --border2:rgba(201,168,64,0.28);
  --green-bg:rgba(60,120,40,0.18);
  --green-text:#7ED95A;
  --amber-bg:rgba(180,120,20,0.18);
  --amber-text:#E8B840;
  --gray-bg:rgba(100,100,100,0.15);
  --gray-text:#8A8780;
  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:16px;
  --shadow:0 2px 8px rgba(0,0,0,0.4),0 8px 32px rgba(0,0,0,0.3);
  --shadow-sm:0 1px 4px rgba(0,0,0,0.3);
}
html{font-size:16px}
body{font-family:'DM Sans',sans-serif;background:var(--black);color:var(--text);min-height:100vh;line-height:1.5}

/* ── HEADER ── */
.page-header{
  background:var(--black2);
  border-bottom:1px solid var(--border);
  padding:0 2.5rem;
  display:flex;align-items:center;justify-content:space-between;
  height:68px;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 20px rgba(0,0,0,0.5);
}
.header-left{display:flex;align-items:center;gap:16px}
.logo-title{
  font-family:'Cormorant Garamond',serif;
  font-size:1.4rem;font-weight:500;
  color:var(--text);letter-spacing:0.03em;
}
.logo-accent{color:var(--gold)}
.logo-divider{width:1px;height:22px;background:var(--border2)}
.logo-badge{
  font-size:10px;font-weight:500;padding:3px 10px;
  background:var(--gold-dim);
  border:1px solid var(--border2);
  border-radius:20px;color:var(--gold);
  letter-spacing:0.05em;text-transform:uppercase;
}
.header-meta{text-align:right;line-height:1.5}
.header-name{
  font-size:13.5px;font-weight:500;color:var(--gold2);
  font-family:'Cormorant Garamond',serif;letter-spacing:0.02em;
}
.header-sub{font-size:11.5px;color:var(--text3)}

/* ── GOLD DIVIDER ── */
.gold-line{
  height:1px;
  background:linear-gradient(to right, transparent, var(--gold), transparent);
  opacity:0.3;margin:0;
}

/* ── CONTAINER ── */
.container{max-width:1200px;margin:0 auto;padding:2rem 1.5rem 5rem}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
@media(max-width:640px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{
  background:var(--black2);
  border:1px solid var(--border);
  border-radius:var(--radius-md);
  padding:16px 18px;box-shadow:var(--shadow-sm);
  position:relative;overflow:hidden;
  transition:border-color .2s;
}
.stat-card:hover{border-color:var(--border2)}
.stat-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  opacity:0.4;
}
.stat-num{
  font-size:1.9rem;font-weight:400;line-height:1;
  font-family:'Cormorant Garamond',serif;color:var(--gold2);
}
.stat-num.green{color:var(--green-text)}
.stat-num.amber{color:var(--amber-text)}
.stat-num.gray{color:var(--gray-text)}
.stat-label{font-size:10px;color:var(--text3);margin-top:6px;text-transform:uppercase;letter-spacing:.08em}

/* ── FILTER PANEL ── */
.filter-panel{
  background:var(--black2);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:1.25rem 1.5rem;
  margin-bottom:1.25rem;box-shadow:var(--shadow);
}
.filter-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:12px;align-items:end}
@media(max-width:768px){.filter-grid{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.filter-grid{grid-template-columns:1fr}}
.filter-group{display:flex;flex-direction:column;gap:5px}
.filter-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--text3)}
.search-input,select{
  font-family:'DM Sans',sans-serif;font-size:13.5px;color:var(--text);
  background:var(--black3);border:1px solid var(--border);
  border-radius:var(--radius-sm);height:40px;padding:0 12px;
  width:100%;outline:none;appearance:none;-webkit-appearance:none;
  transition:border-color .15s,background .15s;
}
.search-input::placeholder{color:var(--text3)}
.search-input:focus,select:focus{border-color:var(--gold);background:var(--black4)}
select option{background:var(--black3);color:var(--text)}
.select-wrap{position:relative}
.select-wrap::after{
  content:'';position:absolute;right:12px;top:50%;transform:translateY(-50%);
  border-left:4px solid transparent;border-right:4px solid transparent;
  border-top:5px solid var(--text3);pointer-events:none;
}
.btn-clear{
  font-family:'DM Sans',sans-serif;font-size:12.5px;height:40px;padding:0 16px;
  background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text3);cursor:pointer;display:flex;align-items:center;gap:6px;
  transition:all .15s;
}
.btn-clear:hover{background:var(--gold-dim);color:var(--gold);border-color:var(--border2)}

/* ── TABLE ── */
.table-wrap{
  background:var(--black2);border:1px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);
}
.table-top{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 18px;border-bottom:1px solid var(--border);
  background:var(--black3);
}
.result-count{font-size:12.5px;color:var(--text3)}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--black3)}
th{
  padding:11px 16px;text-align:left;
  font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;
  color:var(--text3);border-bottom:1px solid var(--border);
  cursor:pointer;user-select:none;white-space:nowrap;transition:color .15s;
}
th:hover{color:var(--gold)}
th.sort-asc::after{content:' ↑';color:var(--gold)}
th.sort-desc::after{content:' ↓';color:var(--gold)}
td{
  padding:12px 16px;border-bottom:1px solid rgba(201,168,64,0.07);
  color:var(--text);vertical-align:middle;
  max-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .1s}
tbody tr:hover{background:var(--gold-dim2)}
.col-cod{width:115px}.col-end{width:auto;min-width:200px}
.col-bairro{width:150px}.col-cidade{width:115px}.col-data{width:120px}.col-link{width:100px}
.cod-text{font-size:11.5px;color:var(--text3);font-variant-numeric:tabular-nums}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-pronto{background:var(--green-bg);color:var(--green-text)}
.badge-futuro{background:var(--amber-bg);color:var(--amber-text)}
.badge-passado{background:var(--gray-bg);color:var(--gray-text)}

/* ── LINK BUTTON ── */
.link-btn{
  display:inline-flex;align-items:center;gap:5px;padding:5px 12px;
  border-radius:var(--radius-sm);border:1px solid var(--border2);
  background:var(--gold-dim);color:var(--gold);font-size:12px;
  font-family:'DM Sans',sans-serif;text-decoration:none;
  transition:all .15s;
}
.link-btn:hover{background:var(--gold);color:var(--black);border-color:var(--gold)}

/* ── EMPTY / LOADING ── */
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text3)}
.empty-state i{font-size:2.5rem;display:block;margin-bottom:.75rem;color:var(--gold);opacity:.3}
.loading{text-align:center;padding:3rem;color:var(--text3);font-size:14px}
.erro{text-align:center;padding:2rem;color:#e05050;font-size:14px}

/* ── PAGINATION ── */
.pagination{
  display:flex;align-items:center;justify-content:center;
  gap:6px;padding:1.25rem;flex-wrap:wrap;
  border-top:1px solid var(--border);
}
.page-btn{
  font-family:'DM Sans',sans-serif;font-size:13px;height:32px;min-width:32px;padding:0 8px;
  border:1px solid var(--border);border-radius:var(--radius-sm);
  background:transparent;color:var(--text3);cursor:pointer;transition:all .1s;
}
.page-btn:hover:not(:disabled){background:var(--gold-dim);color:var(--gold);border-color:var(--border2)}
.page-btn:disabled{opacity:.3;cursor:default}
.page-btn.active{background:var(--gold);color:var(--black);border-color:var(--gold);font-weight:500}
.page-info{font-size:12px;color:var(--text3);margin-left:4px}

/* ── FOOTER ── */
.page-footer{
  text-align:center;padding:1.75rem;font-size:12px;color:var(--text3);
  border-top:1px solid var(--border);
  background:var(--black2);line-height:2;
}
.footer-gold{color:var(--gold);font-weight:500}
</style>
</head>
<body>

<header class="page-header">
  <div class="header-left">
    <span class="logo-title">Empreendimentos <span class="logo-accent">Primários</span></span>
    <div class="logo-divider"></div>
    <span class="logo-badge">QuintoAndar</span>
  </div>
  <div class="header-meta">
    <div class="header-name">Marco Silva</div>
    <div class="header-sub">Parceiro Corretor · Belo Horizonte e região</div>
  </div>
</header>
<div class="gold-line"></div>

<div class="container">

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num" id="s-total">—</div><div class="stat-label">Total filtrado</div></div>
    <div class="stat-card"><div class="stat-num green" id="s-pronto">—</div><div class="stat-label">Prontos</div></div>
    <div class="stat-card"><div class="stat-num amber" id="s-futuro">—</div><div class="stat-label">A entregar</div></div>
    <div class="stat-card"><div class="stat-num gray" id="s-passado">—</div><div class="stat-label">Entregues</div></div>
  </div>

  <div class="filter-panel">
    <div class="filter-grid">
      <div class="filter-group">
        <label class="filter-label" for="f-search">Buscar endereço ou código</label>
        <input class="search-input" type="text" id="f-search" placeholder="Ex: Rua das Flores ou 894516801…">
      </div>
      <div class="filter-group">
        <label class="filter-label" for="f-bairro">Bairro</label>
        <div class="select-wrap"><select id="f-bairro"><option value="">Todos os bairros</option></select></div>
      </div>
      <div class="filter-group">
        <label class="filter-label" for="f-cidade">Cidade</label>
        <div class="select-wrap"><select id="f-cidade"><option value="">Todas as cidades</option></select></div>
      </div>
      <div class="filter-group">
        <label class="filter-label" for="f-status">Status de conclusão</label>
        <div class="select-wrap">
          <select id="f-status">
            <option value="">Todos</option>
            <option value="pronto">Pronto</option>
            <option value="futuro">A entregar</option>
            <option value="passado">Entregue</option>
          </select>
        </div>
      </div>
    </div>
    <div style="margin-top:12px;display:flex;justify-content:flex-end">
      <button class="btn-clear" id="btn-clear">
        <i class="ti ti-x" style="font-size:13px"></i> Limpar filtros
      </button>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-top">
      <span class="result-count" id="result-count"></span>
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th class="col-cod" data-sort="cod">Código</th>
            <th class="col-end" data-sort="end">Endereço</th>
            <th class="col-bairro" data-sort="bairro">Bairro</th>
            <th class="col-cidade" data-sort="cidade">Cidade</th>
            <th class="col-data" data-sort="data">Conclusão</th>
            <th class="col-link">Portal</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="6"><div class="loading">Carregando imóveis…</div></td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

</div>

<footer class="page-footer">
  Buscador de Empreendimentos Primários &nbsp;·&nbsp;
  By: <span class="footer-gold">Marco Silva</span> — Parceiro QuintoAndar BH
</footer>

<script>
const today=new Date();const PER=25;
let allData=[],sortCol='bairro',sortDir=1,page=1;
function tc(s){return s?s.charAt(0)+s.slice(1).toLowerCase():'';}
function getStatus(val){
  const v=(val||'').trim().toUpperCase();
  if(v==='PRONTO')return 'pronto';
  const p=v.split('/');if(p.length<2)return 'passado';
  let d=p.length===3?new Date(+p[2],+p[1]-1,+p[0]):new Date(+p[1],+p[0]-1,1);
  return isNaN(d)?'passado':d>today?'futuro':'passado';
}
function badge(val){
  const s=getStatus(val),v=(val||'').trim();
  if(s==='pronto')return`<span class="badge badge-pronto">Pronto</span>`;
  if(s==='futuro')return`<span class="badge badge-futuro">${v}</span>`;
  return`<span class="badge badge-passado">${v}</span>`;
}
function filtered(){
  const b=document.getElementById('f-bairro').value;
  const c=document.getElementById('f-cidade').value;
  const s=document.getElementById('f-status').value;
  const q=document.getElementById('f-search').value.trim().toLowerCase();
  return allData.filter(r=>{
    if(b&&r.bairro!==b)return false;
    if(c&&r.cidade!==c)return false;
    if(s&&r.status!==s)return false;
    if(q&&!r.end.toLowerCase().includes(q)&&!r.cod.includes(q))return false;
    return true;
  });
}
function sorted(arr){return[...arr].sort((a,b)=>(a[sortCol]||'').localeCompare(b[sortCol]||'',undefined,{numeric:true})*sortDir);}
function render(){
  const f=sorted(filtered());
  const total=f.length,pages=Math.max(1,Math.ceil(total/PER));
  if(page>pages)page=1;
  const slice=f.slice((page-1)*PER,page*PER);
  document.getElementById('s-total').textContent=f.length;
  document.getElementById('s-pronto').textContent=f.filter(r=>r.status==='pronto').length;
  document.getElementById('s-futuro').textContent=f.filter(r=>r.status==='futuro').length;
  document.getElementById('s-passado').textContent=f.filter(r=>r.status==='passado').length;
  document.getElementById('result-count').textContent=`${total} imóvel${total!==1?'eis':''} encontrado${total!==1?'s':''}`;
  const tb=document.getElementById('tbody');
  if(!slice.length){tb.innerHTML=`<tr><td colspan="6"><div class="empty-state"><i class="ti ti-search-off"></i><p>Nenhum imóvel encontrado.</p></div></td></tr>`;document.getElementById('pagination').innerHTML='';return;}
  tb.innerHTML=slice.map(r=>`<tr>
    <td class="col-cod"><span class="cod-text">${r.cod}</span></td>
    <td class="col-end" title="${r.end}">${r.end}</td>
    <td class="col-bairro">${tc(r.bairro)}</td>
    <td class="col-cidade">${tc(r.cidade)}</td>
    <td class="col-data">${badge(r.data)}</td>
    <td class="col-link"><a class="link-btn" href="https://corretor.quintoandar.com.br/informacoes-de-entrada/${r.cod}" target="_blank" rel="noopener"><i class="ti ti-external-link"></i> Abrir</a></td>
  </tr>`).join('');
  const pg=document.getElementById('pagination');
  if(pages<=1){pg.innerHTML='';return;}
  const range=[];
  for(let i=1;i<=pages;i++){if(i===1||i===pages||Math.abs(i-page)<=1)range.push(i);else if(range[range.length-1]!=='…')range.push('…');}
  let html=`<button class="page-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>‹</button>`;
  range.forEach(r=>{html+=r==='…'?`<span style="color:var(--text3);font-size:13px;padding:0 2px">…</span>`:`<button class="page-btn${r===page?' active':''}" onclick="goPage(${r})">${r}</button>`;});
  html+=`<button class="page-btn" onclick="goPage(${page+1})" ${page===pages?'disabled':''}>›</button>`;
  html+=`<span class="page-info">pág. ${page} de ${pages}</span>`;
  pg.innerHTML=html;
}
window.goPage=function(p){page=p;render();window.scrollTo({top:0,behavior:'smooth'});};
function initSelects(){
  const bairros=[...new Set(allData.map(r=>r.bairro))].sort();
  const cidades=[...new Set(allData.map(r=>r.cidade))].sort();
  const selB=document.getElementById('f-bairro'),selC=document.getElementById('f-cidade');
  bairros.forEach(b=>{const o=document.createElement('option');o.value=b;o.textContent=tc(b);selB.appendChild(o);});
  cidades.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=tc(c);selC.appendChild(o);});
}
document.querySelectorAll('th[data-sort]').forEach(th=>{
  th.addEventListener('click',()=>{
    const col=th.dataset.sort;
    if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1;}
    document.querySelectorAll('th[data-sort]').forEach(t=>t.classList.remove('sort-asc','sort-desc'));
    th.classList.add(sortDir===1?'sort-asc':'sort-desc');
    page=1;render();
  });
});
['f-bairro','f-cidade','f-status'].forEach(id=>document.getElementById(id).addEventListener('change',()=>{page=1;render();}));
document.getElementById('f-search').addEventListener('input',()=>{page=1;render();});
document.getElementById('btn-clear').addEventListener('click',()=>{
  ['f-bairro','f-cidade','f-status'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-search').value='';
  page=1;render();
});
fetch('data.json?t='+Date.now())
  .then(r=>{if(!r.ok)throw new Error();return r.json();})
  .then(data=>{allData=data.filter(r=>r.cod).map(r=>({...r,status:getStatus(r.data)}));initSelects();render();})
  .catch(()=>{document.getElementById('tbody').innerHTML=`<tr><td colspan="6"><div class="erro">⚠️ Não foi possível carregar os dados.</div></td></tr>`;});
</script>
</body>
</html>
